<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Prompt</title>
  <style>
    :root {
      --bg: #05070c;
      --glass: rgba(18, 22, 32, 0.7);
      --card: rgba(15, 19, 28, 0.9);
      --accent: #7cf2d4;
      --accent-2: #4da1ff;
      --text: #f6f7fb;
      --muted: #9aabc0;
      --border: rgba(255, 255, 255, 0.05);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      background: radial-gradient(circle at 15% 20%, rgba(124, 242, 212, 0.08), transparent 40%),
                  radial-gradient(circle at 80% 10%, rgba(77, 161, 255, 0.1), transparent 40%),
                  linear-gradient(140deg, #05070c 0%, #0b0f18 50%, #05070c 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 32px 20px 80px;
      position: relative;
      overflow: hidden;
    }
    .glow {
      position: absolute;
      width: 420px;
      height: 420px;
      background: radial-gradient(circle, rgba(124, 242, 212, 0.18), transparent 55%);
      filter: blur(40px);
      top: -120px;
      left: -90px;
      animation: float 10s ease-in-out infinite;
      z-index: 0;
    }
    .glow.b {
      width: 520px;
      height: 520px;
      background: radial-gradient(circle, rgba(77, 161, 255, 0.16), transparent 60%);
      bottom: -140px;
      right: -120px;
      top: auto;
      left: auto;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(14px); }
    }
    .shell {
      position: relative;
      width: min(1100px, 100%);
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .header { text-align: center; }
    .brand { display: inline-flex; align-items: center; gap: 10px; font-weight: 700; letter-spacing: 0.4px; }
    .pulse { width: 12px; height: 12px; border-radius: 50%; background: linear-gradient(120deg, var(--accent), var(--accent-2)); box-shadow: 0 0 14px rgba(124, 242, 212, 0.8); animation: pulse 2.4s ease-in-out infinite; }
    @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 12px rgba(124, 242, 212, 0.7); } 50% { transform: scale(1.1); box-shadow: 0 0 20px rgba(77, 161, 255, 0.7); } 100% { transform: scale(1); box-shadow: 0 0 12px rgba(124, 242, 212, 0.7); } }
    .answer {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 26px;
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.4);
      min-height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 20px;
      line-height: 1.6;
      color: var(--text);
      backdrop-filter: blur(12px);
    }
    .answer.empty { color: var(--muted); }
    .input-bar {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      width: min(820px, 100% - 32px);
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 12px 10px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(14px);
    }
    .input-bar textarea {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 15px;
      resize: none;
      max-height: 140px;
      padding: 8px 4px;
      line-height: 1.4;
    }
    .send {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #02060d;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
      box-shadow: 0 12px 32px rgba(77, 161, 255, 0.35);
      transition: transform 0.1s ease, box-shadow 0.2s ease;
      white-space: nowrap;
    }
    .send:hover { transform: translateY(-1px); box-shadow: 0 16px 40px rgba(124, 242, 212, 0.35); }
    .status { text-align: center; color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow b"></div>
  <div class="shell">
    <div class="header">
      <div class="brand"><span class="pulse"></span>RAG Prompt</div>
    </div>
    <div class="answer empty" id="response">Ask something to see the answer here.</div>
    <div class="status" id="status">Idle</div>
  </div>
  <div class="input-bar">
    <textarea id="query" placeholder="Ask anything..." rows="1">What is Kubernetes?</textarea>
    <button class="send" id="send">Send</button>
  </div>

  <script>
    const logEl = document.getElementById("response");
    const statusEl = document.getElementById("status");
    const inputEl = document.getElementById("query");

    async function sendQuery() {
      const query = document.getElementById("query").value.trim();
      if (!query) {
        logEl.textContent = "Enter a query first.";
        logEl.classList.remove("empty");
        return;
      }
      logEl.textContent = "Awaiting response...";
      logEl.classList.remove("empty");
      statusEl.textContent = "Sending";
      try {
        const url = `/query?q=${encodeURIComponent(query)}`;
        const res = await fetch(url, { method: "POST" });
        const text = await res.text();
        try {
          const json = JSON.parse(text);
          logEl.textContent = JSON.stringify(json, null, 2);
        } catch {
          logEl.textContent = text;
        }
        statusEl.textContent = "Done";
      } catch (err) {
        logEl.textContent = "Request failed: " + err.message;
        statusEl.textContent = "Error";
      }
    }

    document.getElementById("send").addEventListener("click", sendQuery);
    inputEl.addEventListener("keydown", (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
        e.preventDefault();
        sendQuery();
      }
    });
  </script>
</body>
</html>
